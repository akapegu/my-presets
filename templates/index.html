<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preset Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid #222;
    height: 56px;
  }
  .topbar h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* Buttons */
  .btn {
    background: transparent;
    border: 1px solid #333;
    color: #ccc;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { border-color: #666; color: #fff; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn-primary {
    background: #fff;
    color: #000;
    border-color: #fff;
  }
  .btn-primary:hover { background: #ddd; border-color: #ddd; }

  /* Layout */
  .workspace {
    display: flex;
    height: calc(100vh - 56px);
  }

  /* Main image area */
  .main-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }
  .main-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 2px;
  }

  /* Upload state */
  .upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border: 1px dashed #333;
    border-radius: 8px;
    padding: 60px 40px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-zone:hover { border-color: #666; }
  .upload-zone p { font-size: 14px; color: #666; }
  .upload-zone .plus {
    font-size: 32px;
    color: #444;
    line-height: 1;
  }

  /* Preset sidebar */
  .sidebar {
    width: 280px;
    border-left: 1px solid #222;
    display: flex;
    flex-direction: column;
    display: none;
  }
  .sidebar.visible { display: flex; }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid #222;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    flex-shrink: 0;
  }
  .preset-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .preset-list::-webkit-scrollbar { width: 4px; }
  .preset-list::-webkit-scrollbar-track { background: transparent; }
  .preset-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .preset-item {
    cursor: pointer;
    padding: 6px;
    border-radius: 4px;
    margin-bottom: 4px;
    transition: background 0.15s;
    border: 2px solid transparent;
  }
  .preset-item:hover { background: #1a1a1a; }
  .preset-item.active {
    border-color: #fff;
    background: #1a1a1a;
  }
  .preset-item img {
    width: 100%;
    border-radius: 2px;
    display: block;
  }
  .preset-item .preset-name {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-item.active .preset-name { color: #fff; }

  /* Rotation controls */
  .rotate-controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(0,0,0,0.7);
    padding: 4px;
    border-radius: 6px;
    border: 1px solid #333;
  }
  .rotate-btn {
    background: transparent;
    border: none;
    color: #ccc;
    width: 36px;
    height: 36px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .rotate-btn:hover { background: #333; color: #fff; }

  /* Loading overlay */
  .loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .loading.visible { display: flex; }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid #333;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hidden file input */
  #fileInput { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <h1>PRESET</h1>
  <div class="topbar-actions">
    <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload</button>
    <button class="btn btn-primary" id="downloadBtn" disabled onclick="downloadImage()">Download</button>
  </div>
</div>

<div class="workspace">
  <div class="main-area" id="mainArea">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="plus">+</div>
      <p>Upload an image</p>
    </div>
    <img id="mainImage" style="display:none" />
    <div class="rotate-controls" id="rotateControls" style="display:none">
      <button class="rotate-btn" onclick="rotate('ccw')" title="Rotate left">&#x21BA;</button>
      <button class="rotate-btn" onclick="rotate('cw')" title="Rotate right">&#x21BB;</button>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Presets</div>
    <div class="preset-list" id="presetList"></div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)" />

<script>
let sessionId = null;
let currentPreset = 'Original';

function showLoading(show) {
  document.getElementById('loading').classList.toggle('visible', show);
}

async function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  showLoading(true);
  const form = new FormData();
  form.append('image', file);

  try {
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    sessionId = data.session;
    currentPreset = 'Original';

    document.getElementById('mainImage').src = data.main;
    document.getElementById('mainImage').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('rotateControls').style.display = 'flex';
    document.getElementById('sidebar').classList.add('visible');
    document.getElementById('downloadBtn').disabled = false;

    buildPresetList(data.thumbnails);
  } catch (err) {
    alert('Upload failed');
  } finally {
    showLoading(false);
    e.target.value = '';
  }
}

function buildPresetList(thumbnails) {
  const list = document.getElementById('presetList');
  list.innerHTML = '';
  for (const [name, src] of Object.entries(thumbnails)) {
    const item = document.createElement('div');
    item.className = 'preset-item' + (name === currentPreset ? ' active' : '');
    item.dataset.name = name;
    item.innerHTML = `<img src="${src}" /><div class="preset-name">${name}</div>`;
    item.onclick = () => selectPreset(name);
    list.appendChild(item);
  }
}

async function selectPreset(name) {
  if (!sessionId) return;
  currentPreset = name;

  document.querySelectorAll('.preset-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });

  showLoading(true);
  try {
    const res = await fetch('/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: sessionId, preset: name })
    });
    const data = await res.json();
    document.getElementById('mainImage').src = data.main;
  } catch (err) {
    alert('Failed to apply preset');
  } finally {
    showLoading(false);
  }
}

async function rotate(direction) {
  if (!sessionId) return;
  showLoading(true);
  try {
    const res = await fetch('/rotate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: sessionId, direction })
    });
    const data = await res.json();
    document.getElementById('mainImage').src = data.main;
    currentPreset = 'Original';
    buildPresetList(data.thumbnails);
  } catch (err) {
    alert('Rotation failed');
  } finally {
    showLoading(false);
  }
}

async function downloadImage() {
  if (!sessionId) return;
  showLoading(true);
  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: sessionId, preset: currentPreset })
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `edited_${currentPreset.replace(/ /g, '_')}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Download failed');
  } finally {
    showLoading(false);
  }
}

// Drag & drop on upload zone
const mainArea = document.getElementById('mainArea');
mainArea.addEventListener('dragover', e => { e.preventDefault(); });
mainArea.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) {
    const input = document.getElementById('fileInput');
    input.files = e.dataTransfer.files;
    input.dispatchEvent(new Event('change'));
  }
});
</script>
</body>
</html>
