<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preset Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid #222;
    height: 48px;
  }
  .topbar h1 { font-size: 14px; font-weight: 500; letter-spacing: 0.5px; color: #fff; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    background: transparent;
    border: 1px solid #333;
    color: #ccc;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { border-color: #666; color: #fff; }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-primary { background: #fff; color: #000; border-color: #fff; }
  .btn-primary:hover { background: #ddd; border-color: #ddd; }

  .workspace { display: flex; height: calc(100vh - 48px); }

  .main-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    min-width: 0;
  }
  .image-stack {
    position: relative;
    display: none;
    max-width: 100%;
    max-height: 100%;
  }
  .image-stack img {
    max-width: 100%;
    max-height: calc(100vh - 48px - 40px);
    object-fit: contain;
    border-radius: 2px;
    transition: transform 0.2s ease;
    display: block;
  }
  .image-stack .img-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .intensity-bar {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.7);
    padding: 5px 12px;
    border-radius: 5px;
    border: 1px solid #333;
    z-index: 10;
  }
  .intensity-bar.visible { display: flex; }
  .intensity-bar label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .intensity-bar input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 2px;
    background: #333;
    border-radius: 1px;
    outline: none;
  }
  .intensity-bar input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }
  .intensity-bar input[type=range]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  .intensity-val {
    font-size: 10px;
    color: #555;
    min-width: 28px;
    text-align: right;
  }

  .upload-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border: 1px dashed #333;
    border-radius: 8px;
    padding: 48px 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-zone:hover { border-color: #666; }
  .upload-zone p { font-size: 13px; color: #666; }
  .upload-zone .plus { font-size: 28px; color: #444; line-height: 1; }

  .hints {
    display: none;
    position: absolute;
    bottom: 16px;
    right: 16px;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }
  .hints.visible { display: flex; }
  .hint {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #444;
    white-space: nowrap;
  }
  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 20px;
    padding: 0 5px;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    font-size: 10px;
    color: #444;
    background: #131313;
    font-family: inherit;
    line-height: 1;
  }

  .sidebar {
    width: 200px;
    border-left: 1px solid #222;
    display: none;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar.visible { display: flex; }
  .sidebar-header {
    padding: 10px 12px;
    border-bottom: 1px solid #222;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .preset-count { font-size: 10px; color: #444; font-weight: normal; letter-spacing: 0; }
  .preset-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .preset-list::-webkit-scrollbar { width: 3px; }
  .preset-list::-webkit-scrollbar-track { background: transparent; }
  .preset-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .preset-item {
    cursor: pointer;
    padding: 4px;
    border-radius: 3px;
    margin-bottom: 3px;
    transition: background 0.15s;
    border: 2px solid transparent;
  }
  .preset-item:hover { background: #1a1a1a; }
  .preset-item.active { border-color: #fff; background: #1a1a1a; }
  .preset-item .thumb-wrap {
    width: 100%;
    overflow: hidden;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preset-item img { width: 100%; border-radius: 2px; display: block; }
  .preset-list.rotated-vertical .preset-item .thumb-wrap {
    aspect-ratio: 1;
  }
  .preset-list.rotated-vertical .preset-item img {
    width: auto;
    height: 100%;
  }
  .preset-item .preset-name {
    font-size: 10px;
    color: #666;
    margin-top: 3px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-item.active .preset-name { color: #fff; }

  .rotate-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(0,0,0,0.7);
    padding: 3px;
    border-radius: 5px;
    border: 1px solid #333;
  }
  .rotate-btn {
    background: transparent;
    border: none;
    color: #ccc;
    width: 40px;
    height: 40px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .rotate-btn:hover { background: #333; color: #fff; }

  .loading {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 10px;
  }
  .loading.visible { display: flex; }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid #333;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .loading-text { font-size: 12px; color: #666; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 1.5px solid #666;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  #fileInput { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <h1>PRESET</h1>
  <div class="topbar-actions">
    <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload</button>
    <button class="btn btn-primary" id="downloadBtn" disabled onclick="downloadImage()">
      <span id="dlText">Download</span>
      <span id="dlSpinner" class="btn-spinner" style="display:none"></span>
    </button>
  </div>
</div>

<div class="workspace">
  <div class="main-area" id="mainArea">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="plus">+</div>
      <p>Upload an image</p>
    </div>
    <div class="image-stack" id="imageStack">
      <img id="baseImage" />
      <img id="overlayImage" class="img-overlay" />
    </div>
    <div class="intensity-bar" id="intensityBar">
      <label>Intensity</label>
      <input type="range" id="intensitySlider" min="0" max="100" value="100" oninput="setIntensity(this.value)">
      <span class="intensity-val" id="intensityVal">100</span>
    </div>
    <div class="rotate-controls" id="rotateControls" style="display:none">
      <button class="rotate-btn" onclick="rotateImage(-90)" title="Rotate left">&#x21BA;</button>
      <button class="rotate-btn" onclick="rotateImage(90)" title="Rotate right">&#x21BB;</button>
    </div>
    <div class="hints" id="hints">
      <div class="hint"><span class="key">Space</span> Original</div>
      <div class="hint"><span class="key">&uarr;</span> Prev</div>
      <div class="hint"><span class="key">&darr;</span> Next</div>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      Presets
      <span class="preset-count" id="presetCount"></span>
    </div>
    <div class="preset-list" id="presetList"></div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Processing...</div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)" />

<script>
let sessionId = null;
let currentPreset = 'Original';
let previewCache = {};
let originalUri = null;
let presetStream = null;
let totalPresets = 51;
let rotation = 0;
let intensity = 100;

function showLoading(show, text) {
  document.getElementById('loading').classList.toggle('visible', show);
  if (text) document.getElementById('loadingText').textContent = text;
}

function updateCount(loaded) {
  const el = document.getElementById('presetCount');
  if (loaded < totalPresets) {
    el.textContent = `${loaded}/${totalPresets}`;
  } else {
    el.textContent = '';
  }
}

function applyRotation() {
  document.getElementById('baseImage').style.transform = `rotate(${rotation}deg)`;
  document.getElementById('overlayImage').style.transform = `rotate(${rotation}deg)`;
  document.querySelectorAll('.preset-item img').forEach(el => {
    el.style.transform = `rotate(${rotation}deg)`;
  });
  const norm = ((rotation % 360) + 360) % 360;
  const isVertical = (norm === 90 || norm === 270);
  document.getElementById('presetList').classList.toggle('rotated-vertical', isVertical);
}

function setIntensity(val) {
  intensity = parseInt(val);
  document.getElementById('intensityVal').textContent = val;
  document.getElementById('overlayImage').style.opacity = intensity / 100;
}

function updateImageDisplay() {
  const base = document.getElementById('baseImage');
  const overlay = document.getElementById('overlayImage');

  base.src = originalUri;

  if (currentPreset === 'Original' || !previewCache[currentPreset]) {
    overlay.style.display = 'none';
  } else {
    overlay.src = previewCache[currentPreset];
    overlay.style.display = 'block';
    overlay.style.opacity = intensity / 100;
  }
}

async function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  showLoading(true, 'Uploading...');
  rotation = 0;

  const form = new FormData();
  form.append('image', file);

  try {
    const res = await fetch('/upload', { method: 'POST', body: form });
    if (!res.ok) throw new Error('Upload failed');
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    sessionId = data.session;
    currentPreset = 'Original';
    previewCache = {};
    originalUri = data.main;
    intensity = 100;
    document.getElementById('intensitySlider').value = 100;
    document.getElementById('intensityVal').textContent = '100';

    document.getElementById('baseImage').src = data.main;
    document.getElementById('overlayImage').style.display = 'none';
    document.getElementById('imageStack').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('rotateControls').style.display = 'flex';
    document.getElementById('intensityBar').classList.add('visible');
    document.getElementById('sidebar').classList.add('visible');
    document.getElementById('hints').classList.add('visible');
    document.getElementById('downloadBtn').disabled = false;
    document.getElementById('presetList').innerHTML = '';

    showLoading(false);
    streamPresets(sessionId);
  } catch (err) {
    alert('Upload failed');
    showLoading(false);
  } finally {
    e.target.value = '';
  }
}

function streamPresets(sid) {
  if (presetStream) presetStream.close();

  let loaded = 0;
  updateCount(0);

  const es = new EventSource(`/presets-stream?session=${sid}`);
  presetStream = es;

  es.onmessage = function(e) {
    const data = JSON.parse(e.data);

    if (data.done) {
      es.close();
      presetStream = null;
      totalPresets = loaded;
      updateCount(loaded);
      return;
    }

    loaded++;
    updateCount(loaded);

    previewCache[data.name] = data.preview;

    const list = document.getElementById('presetList');
    const item = document.createElement('div');
    item.className = 'preset-item' + (data.name === currentPreset ? ' active' : '');
    item.dataset.name = data.name;
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    const thumbImg = document.createElement('img');
    thumbImg.src = data.thumb;
    thumbImg.style.transform = `rotate(${rotation}deg)`;
    wrap.appendChild(thumbImg);
    const label = document.createElement('div');
    label.className = 'preset-name';
    label.textContent = data.name;
    item.appendChild(wrap);
    item.appendChild(label);
    item.onclick = () => selectPreset(data.name);
    list.appendChild(item);
  };

  es.onerror = function() {
    es.close();
    presetStream = null;
    updateCount(loaded);
  };
}

function selectPreset(name) {
  if (!sessionId || !previewCache[name]) return;
  currentPreset = name;

  document.querySelectorAll('.preset-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });

  updateImageDisplay();
}

function rotateImage(deg) {
  rotation += deg;  // accumulate without modulo so CSS transition always goes one direction
  applyRotation();

  if (sessionId) {
    const serverRot = ((rotation % 360) + 360) % 360;
    fetch('/set-rotation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: sessionId, rotation: serverRot })
    });
  }
}

function downloadImage() {
  if (!sessionId) return;

  const btn = document.getElementById('downloadBtn');
  const dlText = document.getElementById('dlText');
  const dlSpinner = document.getElementById('dlSpinner');

  btn.disabled = true;
  dlText.textContent = 'Processing';
  dlSpinner.style.display = 'inline-block';

  const token = Date.now().toString();
  const params = new URLSearchParams({
    session: sessionId,
    preset: currentPreset,
    intensity: intensity / 100,
    token: token
  });

  // Clear any previous cookie
  document.cookie = 'dl_token=; path=/; max-age=0';

  // Start download via iframe to avoid navigating away
  let iframe = document.getElementById('dlFrame');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.id = 'dlFrame';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }
  iframe.src = `/download?${params.toString()}`;

  // Poll for the cookie the server sets when the file is ready
  const poll = setInterval(() => {
    if (document.cookie.includes('dl_token=' + token)) {
      clearInterval(poll);
      document.cookie = 'dl_token=; path=/; max-age=0';
      btn.disabled = false;
      dlText.textContent = 'Download';
      dlSpinner.style.display = 'none';
    }
  }, 500);

  // Fallback: restore after 60s regardless
  setTimeout(() => {
    clearInterval(poll);
    btn.disabled = false;
    dlText.textContent = 'Download';
    dlSpinner.style.display = 'none';
  }, 60000);
}

// Keyboard shortcuts
let presetBeforeSpace = null;

function getPresetNames() {
  return Array.from(document.querySelectorAll('.preset-item')).map(el => el.dataset.name);
}

document.addEventListener('keydown', e => {
  if (!sessionId) return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (!presetBeforeSpace) {
      presetBeforeSpace = currentPreset;
      // Show original by hiding overlay
      document.getElementById('overlayImage').style.display = 'none';
    }
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    const names = getPresetNames();
    if (!names.length) return;
    const idx = names.indexOf(currentPreset);
    const next = names[Math.min(idx + 1, names.length - 1)];
    selectPreset(next);
    scrollToPreset(next);
  } else if (e.code === 'ArrowUp') {
    e.preventDefault();
    const names = getPresetNames();
    if (!names.length) return;
    const idx = names.indexOf(currentPreset);
    const prev = names[Math.max(idx - 1, 0)];
    selectPreset(prev);
    scrollToPreset(prev);
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space' && presetBeforeSpace) {
    e.preventDefault();
    currentPreset = presetBeforeSpace;
    presetBeforeSpace = null;
    updateImageDisplay();
  }
});

function scrollToPreset(name) {
  const el = document.querySelector(`.preset-item[data-name="${name}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

const mainArea = document.getElementById('mainArea');
mainArea.addEventListener('dragover', e => { e.preventDefault(); });
mainArea.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) {
    const input = document.getElementById('fileInput');
    input.files = e.dataTransfer.files;
    input.dispatchEvent(new Event('change'));
  }
});
</script>
</body>
</html>
